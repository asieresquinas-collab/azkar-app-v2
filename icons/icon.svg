<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1B4F8A"/>
  <rect x="20" y="20" width="472" height="472" rx="64" fill="none" stroke="#2376C5" stroke-width="4"/>
  <!-- Truck body -->
  <rect x="80" y="220" width="220" height="140" rx="12" fill="#fff"/>
  <rect x="300" y="260" width="100" height="100" rx="10" fill="#E85C0D"/>
  <!-- Cab window -->
  <rect x="310" y="272" width="60" height="40" rx="6" fill="#fff" opacity="0.9"/>
  <!-- Wheels -->
  <circle cx="160" cy="370" r="30" fill="#333"/>
  <circle cx="160" cy="370" r="14" fill="#888"/>
  <circle cx="360" cy="370" r="30" fill="#333"/>
  <circle cx="360" cy="370" r="14" fill="#888"/>
  <!-- Road line -->
  <rect x="60" y="395" width="392" height="6" rx="3" fill="#2376C5" opacity="0.5"/>
  <!-- AZKAR text -->
  <text x="256" y="180" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#fff" letter-spacing="8">AZKAR</text>
  <!-- Subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="#D6E4F7" letter-spacing="3">MUDANZAS</text>
</svg>